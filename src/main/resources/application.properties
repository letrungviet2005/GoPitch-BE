spring.application.name=FourStars
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database (override via env)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gopitch}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# JWT (override via env in production)
fourstars.jwt.access-token-validity-in-seconds=${JWT_ACCESS_EXPIRY:86400}
fourstars.jwt.refresh-token-validity-in-seconds=${JWT_REFRESH_EXPIRY:604800}
fourstars.jwt.base64-secret=${JWT_BASE64_SECRET:MzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMg==}

# Pagination (1-indexed)
spring.data.web.pageable.one-indexed-parameters=true

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
fourstars.upload-dir=${UPLOAD_DIR:./uploads/}

# PayOS (set via env)
fourstars.payos.client-id=${PAYOS_CLIENT_ID:}
fourstars.payos.api-key=${PAYOS_API_KEY:}
fourstars.payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
fourstars.payos.return-url=${PAYOS_RETURN_URL:http://localhost:5173/payment-success}
fourstars.payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:5173/payment-failed}

# Actuator
management.endpoints.web.exposure.include=health,info
